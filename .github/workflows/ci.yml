name: CI

# Run the test suite and a production build on every push / PR so regressions
# are caught before they reach main (and before a deploy auto-triggers).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        # Tests mock all external services (LLM, search, DB), so no live
        # Postgres/Redis is needed. Dummy secrets keep config validation happy.
        env:
          GROQ_API_KEY: test
          SERPER_API_KEY: test
          AUTH_SECRET: test-secret-not-used-in-ci
        run: python -m pytest -q

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        # A successful production build catches type/import/SSR errors that dev
        # mode hides. The API URL is only read at runtime, so a placeholder is fine.
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
